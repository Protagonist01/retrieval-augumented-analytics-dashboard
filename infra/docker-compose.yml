services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: raa-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-1024}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-RAA Dashboard}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-sqlcoder:7b}
      - DUCKDB_DATA_DIR=/app/data/sample
      - MAX_RESULT_ROWS=${MAX_RESULT_ROWS:-10000}
      - QUERY_TIMEOUT_SECONDS=${QUERY_TIMEOUT_SECONDS:-5}
      - REDIS_URL=redis://redis:6379
      - SCHEMA_CACHE_TTL_SECONDS=${SCHEMA_CACHE_TTL_SECONDS:-300}
      - QUERY_CACHE_TTL_SECONDS=${QUERY_CACHE_TTL_SECONDS:-60}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    volumes:
      - ../data:/app/data
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    container_name: raa-redis
    ports:
      - "6379:6379"
