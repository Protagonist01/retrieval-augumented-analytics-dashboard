name: Create Roadmap Issues

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/create-roadmap-issues.yml

permissions:
  contents: read
  issues: write

jobs:
  create-roadmap-issues:
    name: Create roadmap issue batch
    runs-on: ubuntu-latest
    if: github.repository == 'Protagonist01/retrieval-augumented-analytics-dashboard'
    steps:
      - name: Create phase trackers and Phase 1 work items
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function listIssues() {
              return github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: "all",
                per_page: 100,
              });
            }

            let existingIssues = await listIssues();

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name,
                });
                core.info(`Label already exists: ${name}`);
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                });
                core.info(`Created label: ${name}`);
              }
            }

            async function listMilestones() {
              return github.paginate(github.rest.issues.listMilestones, {
                owner,
                repo,
                state: "all",
                per_page: 100,
              });
            }

            async function ensureMilestone(title, description) {
              const milestones = await listMilestones();
              const existing = milestones.find((milestone) => milestone.title === title);
              if (existing) {
                core.info(`Milestone already exists: ${title}`);
                return existing;
              }

              const { data } = await github.rest.issues.createMilestone({
                owner,
                repo,
                title,
                description,
              });
              core.info(`Created milestone: ${title}`);
              return data;
            }

            async function findIssue(title) {
              existingIssues = await listIssues();
              return existingIssues.find((issue) => issue.title === title && !issue.pull_request);
            }

            async function ensureIssue({ title, body, labels = ["enhancement"] }) {
              const existing = await findIssue(title);
              if (existing) {
                core.info(`Issue already exists: #${existing.number} ${title}`);
                return existing;
              }

              const { data } = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels,
              });

              core.info(`Created issue: #${data.number} ${title}`);
              return data;
            }

            const labelDefinitions = [
              ["roadmap", "6E7781", "Roadmap tracker issue"],
              ["phase:1", "0E8A16", "Phase 1 roadmap work"],
              ["phase:2", "1D76DB", "Phase 2 roadmap work"],
              ["phase:3", "5319E7", "Phase 3 roadmap work"],
              ["phase:4", "B60205", "Phase 4 roadmap work"],
              ["phase:5", "D93F0B", "Phase 5 roadmap work"],
              ["phase:6", "0052CC", "Phase 6 roadmap work"],
              ["phase:7", "006B75", "Phase 7 roadmap work"],
              ["product-polish", "A2EEEF", "Product polish and UX improvements"],
              ["user-data", "C5DEF5", "User data ingestion and schema work"],
              ["dashboards", "D4C5F9", "Dashboard builder work"],
              ["analytics-intelligence", "F9D0C4", "Smarter analytics work"],
              ["evals", "FEF2C0", "Evaluation and model-quality work"],
              ["infrastructure", "BFDADC", "Infrastructure and operations work"],
              ["data-sources", "BFD4F2", "External data-source connector work"],
              ["ci", "FBCA04", "Continuous integration work"],
            ];

            for (const [name, color, description] of labelDefinitions) {
              await ensureLabel(name, color, description);
            }

            const milestoneDefinitions = [
              ["Phase 1: Product Polish", "Product polish, saved workflows, exports, and CI."],
              ["Phase 2: User Data", "Bring user-owned datasets into the application."],
              ["Phase 3: Dashboards", "Save answers into reusable dashboards."],
              ["Phase 4: Smarter Analytics", "Clarifying questions, semantic metrics, and answer traceability."],
              ["Phase 5: Model and Eval System", "Evaluation dashboard, model comparisons, and quality tracking."],
              ["Phase 6: Real App Infrastructure", "Authentication, workspaces, permissions, and admin tools."],
              ["Phase 7: External Data Sources", "Database connectors and scheduled or live data access."],
            ];

            const milestonesByTitle = {};
            for (const [title, description] of milestoneDefinitions) {
              milestonesByTitle[title] = await ensureMilestone(title, description);
            }

            const phases = [
              {
                title: "Phase 1: Product Polish",
                labels: ["roadmap", "phase:1", "product-polish"],
                body: `## Goal
            Make the app feel more complete and trustworthy for day-to-day use.

            ## Planned work
            - [ ] Add query history with generated SQL, runtime, and result metadata.
            - [ ] Add saved questions for commonly used analytics prompts.
            - [ ] Add SQL edit mode for advanced users before execution.
            - [ ] Add CSV export for result tables.
            - [ ] Improve loading, empty, and error states across the query workflow.
            - [ ] Add GitHub Actions CI for backend tests, Ruff, frontend lint, build, and audit.

            ## Notes
            This is a phase tracker. Individual implementation issues should link back here.`,
              },
              {
                title: "Phase 2: User Data",
                labels: ["roadmap", "phase:2", "user-data"],
                body: `## Goal
            Let users bring their own datasets into the dashboard.

            ## Planned work
            - [ ] Add CSV upload from the web app.
            - [ ] Add dataset preview before querying.
            - [ ] Add schema refresh after dataset changes.
            - [ ] Add a data dictionary editor for column descriptions, synonyms, and business terms.
            - [ ] Persist dataset metadata for reuse across sessions.`,
              },
              {
                title: "Phase 3: Dashboards",
                labels: ["roadmap", "phase:3", "dashboards"],
                body: `## Goal
            Let users turn useful answers into reusable dashboards.

            ## Planned work
            - [ ] Save charts, tables, and KPIs to dashboards.
            - [ ] Rename dashboard cards and metrics.
            - [ ] Reorder dashboard cards.
            - [ ] Add chart customization for chart type, labels, axes, and formatting.
            - [ ] Export dashboards as PDF or image.`,
              },
              {
                title: "Phase 4: Smarter Analytics",
                labels: ["roadmap", "phase:4", "analytics-intelligence"],
                body: `## Goal
            Make answers more reliable, explainable, and business-aware.

            ## Planned work
            - [ ] Ask clarifying questions when prompts are ambiguous.
            - [ ] Add a semantic metrics layer for reusable definitions.
            - [ ] Define metrics such as revenue, average order value, retention, and margin.
            - [ ] Show how each answer was calculated.
            - [ ] Add source table and column traceability for generated answers.`,
              },
              {
                title: "Phase 5: Model and Eval System",
                labels: ["roadmap", "phase:5", "evals"],
                body: `## Goal
            Turn the existing eval harness into a visible model-quality workflow.

            ## Planned work
            - [ ] Build an evaluation dashboard for the existing golden set.
            - [ ] Add failed-case review and retry workflows.
            - [ ] Add model comparison runs for OpenRouter, OpenAI, and Ollama.
            - [ ] Store eval result history over time.
            - [ ] Track SQL validity, execution accuracy, and latency trends.`,
              },
              {
                title: "Phase 6: Real App Infrastructure",
                labels: ["roadmap", "phase:6", "infrastructure"],
                body: `## Goal
            Add the infrastructure expected from a multi-user analytics application.

            ## Planned work
            - [ ] Add authentication.
            - [ ] Add workspaces or projects.
            - [ ] Add role-based table and column access controls.
            - [ ] Add a Redis cache inspector.
            - [ ] Add an admin monitoring page.`,
              },
              {
                title: "Phase 7: External Data Sources",
                labels: ["roadmap", "phase:7", "data-sources"],
                body: `## Goal
            Connect the dashboard to real databases beyond local files.

            ## Planned work
            - [ ] Add a Postgres connector.
            - [ ] Add a MySQL connector.
            - [ ] Add a Supabase connector.
            - [ ] Explore BigQuery and Snowflake support.
            - [ ] Add scheduled syncs or live querying.`,
              },
            ];

            const createdPhases = {};
            for (const phase of phases) {
              createdPhases[phase.title] = await ensureIssue(phase);
            }

            const phase1 = createdPhases["Phase 1: Product Polish"];
            const phase1Ref = phase1 ? `\n\nPart of #${phase1.number}.` : "";

            const workItems = [
              {
                title: "Add query history",
                labels: ["enhancement", "phase:1", "product-polish"],
                body: `## Goal
            Show previous questions, generated SQL, runtime, and result metadata.

            ## Acceptance criteria
            - [ ] Users can see recent questions in the UI.
            - [ ] Each history entry includes generated SQL and status.
            - [ ] Selecting a history entry restores or reruns the query.
            - [ ] Tests cover the history state and rendering behavior.${phase1Ref}`,
              },
              {
                title: "Add saved questions",
                labels: ["enhancement", "phase:1", "product-polish"],
                body: `## Goal
            Let users save commonly used analytics prompts.

            ## Acceptance criteria
            - [ ] Users can save a question from the query input.
            - [ ] Saved questions are listed in the UI.
            - [ ] Users can run a saved question with one action.
            - [ ] Saved questions survive a page refresh.${phase1Ref}`,
              },
              {
                title: "Add SQL edit mode",
                labels: ["enhancement", "phase:1", "product-polish"],
                body: `## Goal
            Let advanced users inspect and adjust generated SQL before execution.

            ## Acceptance criteria
            - [ ] Users can toggle an edit mode for generated SQL.
            - [ ] Edited SQL still goes through validation.
            - [ ] Dangerous SQL remains blocked.
            - [ ] The UI clearly distinguishes generated SQL from edited SQL.${phase1Ref}`,
              },
              {
                title: "Export result tables as CSV",
                labels: ["enhancement", "phase:1", "product-polish"],
                body: `## Goal
            Let users download query results for external analysis.

            ## Acceptance criteria
            - [ ] Result tables expose a CSV export action.
            - [ ] Exported CSV includes headers.
            - [ ] Values are escaped correctly.
            - [ ] Empty result sets are handled gracefully.${phase1Ref}`,
              },
              {
                title: "Improve query workflow loading and error states",
                labels: ["enhancement", "phase:1", "product-polish"],
                body: `## Goal
            Make the streaming query flow easier to understand when work is pending or fails.

            ## Acceptance criteria
            - [ ] Each pipeline phase has a clear visual state.
            - [ ] Errors include useful user-facing context.
            - [ ] Empty states do not look broken.
            - [ ] Loading states fit the light UI theme.${phase1Ref}`,
              },
              {
                title: "Add GitHub Actions CI",
                labels: ["enhancement", "phase:1", "ci"],
                body: `## Goal
            Run project checks automatically on every push and pull request.

            ## Acceptance criteria
            - [ ] Backend Ruff check runs in CI.
            - [ ] Backend tests run in CI.
            - [ ] Frontend lint runs in CI.
            - [ ] Frontend build runs in CI.
            - [ ] npm audit runs in CI or is documented separately.${phase1Ref}`,
              },
            ];

            for (const issue of workItems) {
              await ensureIssue(issue);
            }

            const metadataByTitle = {
              "Phase 1: Product Polish": {
                labels: ["roadmap", "phase:1", "product-polish"],
                milestone: "Phase 1: Product Polish",
              },
              "Phase 2: User Data": {
                labels: ["roadmap", "phase:2", "user-data"],
                milestone: "Phase 2: User Data",
              },
              "Phase 3: Dashboards": {
                labels: ["roadmap", "phase:3", "dashboards"],
                milestone: "Phase 3: Dashboards",
              },
              "Phase 4: Smarter Analytics": {
                labels: ["roadmap", "phase:4", "analytics-intelligence"],
                milestone: "Phase 4: Smarter Analytics",
              },
              "Phase 5: Model and Eval System": {
                labels: ["roadmap", "phase:5", "evals"],
                milestone: "Phase 5: Model and Eval System",
              },
              "Phase 6: Real App Infrastructure": {
                labels: ["roadmap", "phase:6", "infrastructure"],
                milestone: "Phase 6: Real App Infrastructure",
              },
              "Phase 7: External Data Sources": {
                labels: ["roadmap", "phase:7", "data-sources"],
                milestone: "Phase 7: External Data Sources",
              },
              "Add query history": {
                labels: ["enhancement", "phase:1", "product-polish"],
                milestone: "Phase 1: Product Polish",
              },
              "Add saved questions": {
                labels: ["enhancement", "phase:1", "product-polish"],
                milestone: "Phase 1: Product Polish",
              },
              "Add SQL edit mode": {
                labels: ["enhancement", "phase:1", "product-polish"],
                milestone: "Phase 1: Product Polish",
              },
              "Export result tables as CSV": {
                labels: ["enhancement", "phase:1", "product-polish"],
                milestone: "Phase 1: Product Polish",
              },
              "Improve query workflow loading and error states": {
                labels: ["enhancement", "phase:1", "product-polish"],
                milestone: "Phase 1: Product Polish",
              },
              "Add GitHub Actions CI": {
                labels: ["enhancement", "phase:1", "ci"],
                milestone: "Phase 1: Product Polish",
              },
            };

            for (const [title, metadata] of Object.entries(metadataByTitle)) {
              const issue = await findIssue(title);
              if (!issue) {
                core.warning(`Could not find issue for metadata update: ${title}`);
                continue;
              }

              await github.rest.issues.setLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: metadata.labels,
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                milestone: milestonesByTitle[metadata.milestone].number,
              });

              core.info(`Updated metadata for #${issue.number} ${title}`);
            }
