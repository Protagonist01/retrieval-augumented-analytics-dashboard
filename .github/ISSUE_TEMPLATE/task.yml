name: Task
description: Track smaller implementation, cleanup, or infrastructure work.
title: "[Task]: "
labels:
  - task
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      placeholder: |
        - [ ] Add implementation
        - [ ] Add or update tests
        - [ ] Update docs if needed
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - Eval
        - Infra
        - Docs
        - CI
        - Product
    validations:
      required: true
