name: Feature
description: Track a planned product feature.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: phase
    attributes:
      label: Roadmap phase
      options:
        - Phase 1: Product Polish
        - Phase 2: User Data
        - Phase 3: Dashboards
        - Phase 4: Smarter Analytics
        - Phase 5: Model and Eval System
        - Phase 6: Real App Infrastructure
        - Phase 7: External Data Sources
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What user or developer problem does this solve?
      placeholder: Describe the outcome this feature should create.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should be included in the first version?
      placeholder: List the core tasks for this feature.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true before this issue is done?
      placeholder: |
        - Users can...
        - The backend...
        - Tests cover...
    validations:
      required: true
